<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
body{margin:0;background:#000;color:#fff;font-family:-apple-system,sans-serif}
.tab{display:flex;position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #333}
.t{flex:1;padding:12px 4px;text-align:center;font-size:13px;color:#666;border:none;background:none;cursor:pointer}
.t.on{color:#0a84ff}
.page{display:none;padding:20px;padding-bottom:80px;min-height:100vh}
.page.on{display:block}
h1{font-size:24px;margin-bottom:20px}
.btn{display:block;width:100%;padding:16px;margin-bottom:12px;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div id="p1" class="page on">
<h1>Page 1 - Accueil</h1>
<button class="btn" style="background:#0a84ff;color:#fff" onclick="alert('Bouton 1 fonctionne !')">Test clic 1</button>
<button class="btn" style="background:#30d158;color:#fff" onclick="alert('Bouton 2 fonctionne !')">Test clic 2</button>
<p style="color:#aaa;margin-top:20px">Si tu peux cliquer sur ces boutons et voir une alerte, les clics fonctionnent.</p>
</div>

<div id="p2" class="page">
<h1>Page 2 - Séance</h1>
<button class="btn" style="background:#ff9f0a;color:#fff" onclick="alert('Page 2 fonctionne !')">Test page 2</button>
</div>

<div id="p3" class="page">
<h1>Page 3 - Stats</h1>
<p>Page 3 ok</p>
</div>

<div class="tab">
<button class="t on" onclick="nav(1)">🏠 Accueil</button>
<button class="t" onclick="nav(2)">💪 Séance</button>
<button class="t" onclick="nav(3)">📈 Stats</button>
</div>

<script>
function nav(n) {
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on')});
  document.querySelectorAll('.t').forEach(function(t){t.classList.remove('on')});
  document.getElementById('p'+n).classList.add('on');
  document.querySelectorAll('.t')[n-1].classList.add('on');
}
</script>
</body>
</html>
